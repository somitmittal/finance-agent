services:
  - type: web
    name: finance-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: INDIAN_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
